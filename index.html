<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSSアニメーションのスタイル */
        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* クリック時のアクション用のスタイル */
        .random-emoji {
            display: none;
            position: absolute;
        }

        /* 画面遷移用のスタイル */
        .hidden {
            display: none;
        }

        /* ボタンのスタイル */
        .social-buttons a {
            display: inline-block;
            margin: 10px;
            background-color: #3498db;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s ease;
        }

        .social-buttons a:hover {
            transform: scale(1.1);
        }

        /* ボタンのクリック時のアニメーション */
        @keyframes buttonClickAnimation {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
    </style>
    <title>Your Stylish Website</title>
</head>
<body>
    <div class="container">
        <div class="left-side">
            <h1 id="animated-text" style="animation: slideIn 1.5s ease 1.4s forwards;">NEZUMI - PROJECT</h1>
            <p style="animation: slideIn 1.5s ease 1.4s forwards;">Welcome to the mouse community :D</p>
            <div class="social-buttons">
                <a href="#" onclick="showRandomEmoji(this)">Button 1</a>
                <a href="#" onclick="showRandomEmoji(this)">Button 2</a>
                <a href="#" onclick="showRandomEmoji(this)">Button 3</a>
            </div>
        </div>
    </div>

    <!-- ランダムな絵文字を表示する要素 -->
    <div class="random-emoji" id="emoji-container"></div>

    <!-- 画面遷移用のダミーリンク -->
    <a href="#" id="transition-link" class="hidden"></a>

    <script>
        // ランダムな絵文字のリスト
        const emojis = ['🐶', '🌟', '💕'];

        // ページが読み込まれたときにアニメーションを開始
        window.addEventListener('load', () => {
            const animatedText = document.getElementById('animated-text');
            animatedText.style.animation = 'slideIn 1.5s ease 1.4s forwards';
            const paragraphs = document.querySelectorAll('.left-side p');
            paragraphs.forEach((p, index) => {
                p.style.animation = `slideIn 1.5s ease ${1.4 + 0.2 * index}s forwards`;
            });
        });

        // ボタンをクリックしたときのアクション
        function showRandomEmoji(button) {
            // ボタンの位置を取得
            const buttonRect = button.getBoundingClientRect();
            const centerX = buttonRect.left + buttonRect.width / 2;
            const centerY = buttonRect.top + buttonRect.height / 2;

            // ボタンの中心にランダムな絵文字を表示
            const emojiContainer = document.getElementById('emoji-container');
            emojiContainer.style.display = 'block';
            emojiContainer.style.left = `${centerX}px`;
            emojiContainer.style.top = `${centerY}px`;
            emojiContainer.innerText = emojis[Math.floor(Math.random() * emojis.length)];

            // ボタンのクリックアニメーションを追加
            button.style.animation = 'buttonClickAnimation 0.5s ease';
            button.style.pointerEvents = 'none';

            // 0.5秒後にボタンのクリックアニメーションをリセット
            setTimeout(() => {
                button.style.animation = '';
                button.style.pointerEvents = 'auto';
            }, 500);

            // 1.4秒後に画面遷移する
            setTimeout(() => {
                const transitionLink = document.getElementById('transition-link');
                transitionLink.click();
            }, 1400);
        }
    </script>
</body>
</html>
