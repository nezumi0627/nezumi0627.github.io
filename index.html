<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <meta property="og:title" content="Nezumi's web page">
    <meta property="og:description" content="ねずみのいろいろです">
    <meta property="og:image" content="https://raw.githubusercontent.com/nezumi0627/nezumi0627.github.io/main/icon.jpg">
    <meta property="og:url" content="https://nezumi0627.github.io">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Nezumi project">
    <meta property="og:locale" content="ja">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        /* 共通のスタイル */
        body {
            background-color: #0c0c0c;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 800px;
            margin: 100px auto 20px; /* ボタンを少し下に移動 */
            padding: 20px;
            color: white;
            text-align: center; /* ボタンを中央に配置 */
        }

        /* ボタンのスタイル */
        .btn {
            background-color: #4CAF50; /* ボタンの背景色 */
            color: white;
            padding: 15px 32px;
            text-align: center;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            margin: 10px;
            transition: background-color 0.3s; /* ボタンのホバーエフェクト */
        }

        .btn:hover {
            background-color: #45a049; /* ホバー時の背景色 */
        }

        /* ハンバーガーメニュー */
        .hamburger {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            cursor: pointer;
        }

        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: rgba(192, 192, 192, 0.5); /* 薄灰色の透過背景 */
            margin: 5px;
            transition: all 0.3s ease;
        }

        .hamburger.active div:nth-child(1) {
            transform: rotate(-45deg) translate(-5px, 6px);
        }

        .hamburger.active div:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active div:nth-child(3) {
            transform: rotate(45deg) translate(-5px, -6px);
        }

        /* ナビゲーションメニュー */
        .nav-menu {
            position: fixed;
            top: 60px; /* ボタンからの距離を調整 */
            right: 20px;
            height: 100vh;
            width: 200px;
            background-color: rgba(192, 192, 192, 0.8); /* 薄灰色の透過背景 */
            z-index: 998;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .nav-menu.active {
            transform: translateX(0);
        }

        .nav-menu ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-menu ul li {
            text-align: center; /* リスト項目を中央揃え */
            padding: 20px 0;
        }

        .nav-menu ul li a {
            text-decoration: none;
            color: black; /* テキストカラーを黒に */
            font-size: 18px;
            transition: color 0.3s; /* リンクのホバーエフェクト */
        }

        .nav-menu ul li a:hover {
            color: #333; /* ホバー時のテキストカラー */
        }
        
        /* 画像スライドショー */
        .slideshow-container {
            max-width: 1000px;
            margin: auto;
            position: relative;
        }

        .mySlides {
            display: none;
        }

        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
        }

        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }

        .prev:hover, .next:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .fade {
            -webkit-animation-name: fade;
            -webkit-animation-duration: 1.5s;
            animation-name: fade;
            animation-duration: 1.5s;
        }

        @-webkit-keyframes fade {
            from {opacity: .4} 
            to {opacity: 1}
        }

        @keyframes fade {
            from {opacity: .4} 
            to {opacity: 1}
        }
    </style>
    <title>Nezumi's web page</title>
</head>
<body>
    <div class="container">
        <button class="btn" onclick="window.location.href = 'server.html';">Serverの紹介ページへ</button>
        <button class="btn" onclick="window.location.href = 'myinfo.html';">自己紹介ページへ</button>
        <button class="btn" onclick="window.location.href = 'product.html';">製品紹介ページへ</button>
    </div>
    <div class="hamburger">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <div class="nav-menu">
        <ul>
            <li><a href="index.html">ホームに戻る</a></li>
            <li><a href="server.html">Serverの紹介ページ</a></li>
            <li><a href="myinfo.html">自己紹介ページ</a></li>
            <li><a href="product.html">製品紹介ページ</a></li>
        </ul>
    </div>

    <div class="slideshow-container">
        <div class="mySlides fade">
            <img src="https://raw.githubusercontent.com/nezumi0627/nezumi0627.github.io/main/sss1.png" style="width:100%">
        </div>
        <div class="mySlides fade">
            <img src="https://raw.githubusercontent.com/nezumi0627/nezumi0627.github.io/main/sss2.png" style="width:100%">
        </div>
        <div class="mySlides fade">
            <img src="https://raw.githubusercontent.com/nezumi0627/nezumi0627.github.io/main/sss3.png" style="width:100%">
        </div>
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>

    <script>
        var slideIndex = 1;
        showSlides(slideIndex);

        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

        function currentSlide(n) {
            showSlides(slideIndex = n);
        }

        function showSlides(n) {
            var i;
            var slides = document.getElementsByClassName("mySlides");
            if (n > slides.length) {slideIndex = 1}
            if (n < 1) {slideIndex = slides.length}
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slides[slideIndex - 1].style.display = "block";
        }
    </script>
</body>
</html>
