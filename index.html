<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <meta property="og:title" content="Nezumi's web page">
    <meta property="og:description" content="ねずみのいろいろです">
    <meta property="og:image" content="https://raw.githubusercontent.com/nezumi0627/nezumi0627.github.io/main/icon.jpg">
    <meta property="og:url" content="https://nezumi0627.github.io">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Nezumi project">
    <meta property="og:locale" content="ja">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        /* スマートフォン用のスタイル */
        @media (max-width: 400px) {
            .container {
                max-width: 100%;
            }
        }

        /* PC用のスタイル */
        @media (min-width: 401px) {
            .container {
                max-width: 800px;
                margin: 0 auto;
                text-align: center; /* 中央に配置する */
            }
        }

        /* 共通のスタイル */
        body {
            background-color: #0c0c0c;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            color: white;
        }

        /* ハンバーガーメニュー */

        .hamburger {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            cursor: pointer;
        }

        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: white;
            margin: 5px;
            transition: all 0.3s ease;
        }

        .hamburger.active div:nth-child(1) {
            transform: rotate(-45deg) translate(-5px, 6px);
        }

        .hamburger.active div:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active div:nth-child(3) {
            transform: rotate(45deg) translate(-5px, -6px);
        }

        /* ナビゲーションメニュー */

        .nav-menu {
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            width: 200px;
            background-color: #0c0c0c;
            z-index: 998;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .nav-menu.active {
            transform: translateX(0);
        }

        .nav-menu ul {
            list-style: none;
            padding: 0;
        }

        .nav-menu ul li {
            padding: 20px;
            text-align: right;
        }

        .nav-menu ul li a {
            text-decoration: none;
            color: white;
        }

        .nav-menu ul li a:hover {
            color: #cccccc;
        }
    </style>
    <title>Nezumi's web page</title>
</head>
<body>
    <div class="container">
        <button onclick="window.location.href = 'server.html';">Serverの紹介ページへ</button>
        <button onclick="window.location.href = 'myinfo.html';">自己紹介ページへ</button>
        <button onclick="window.location.href = 'product.html';">製品紹介ページへ</button>
    </div>
    <div class="hamburger">
        <div></div>
        <div></div>
        <div></div>
    </div>
    <div class="nav-menu">
        <ul>
            <li><a href="server.html">Serverの紹介ページ</a></li>
            <li><a href="myinfo.html">自己紹介ページ</a></li>
            <li><a href="product.html">製品紹介ページ</a></li>
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
