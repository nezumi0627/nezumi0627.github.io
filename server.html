<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <meta property="og:title" content="Serverの紹介ページ">
    <meta property="og:description" content="サーバーについての紹介ページです">
    <meta property="og:image" content="https://raw.githubusercontent.com/nezumi0627/nezumi0627.github.io/main/icon.png">
    <meta property="og:url" content="https://nezumi0627.github.io/server.html">

    <style>
        /* スマートフォン用のスタイル */
        @media (max-width: 400px) {
            .container {
                max-width: 100%;
            }
        }

        /* PC用のスタイル */
        @media (min-width: 401px) {
            .container {
                max-width: 800px;
                margin: 0 auto;
            }
        }
        img {
            max-width: 100%;
            height: auto;
        }
    </style>
    <title>Serverの紹介ページ</title>
</head>
<body>
    <div class="container">
        <h1>サーバー紹介！</h1>
        <p>普段の会話の場や通話相手、するためのサーバーです</p>
        <h1>鯖主(わたし)はまだ15歳!!!</h1>
        <p>鯖主(わたし)はまだ15歳なのでラフに絡むことが出来ます</p>
        <p>普段の会話です...会話？？？？？</p>
        <img src="https://raw.githubusercontent.com/nezumi0627/nezumi0627.github.io/main/Talk.png" alt="普段の会話">
        <p>こんなかんじでサーバーの改善を行うために要望案を送っていただけます！</p>
        <img src="https://raw.githubusercontent.com/nezumi0627/nezumi0627.github.io/main/%E3%82%B9%E3%82%AF%E3%83%AA%E3%83%BC%E3%83%B3%E3%82%B7%E3%83%A7%E3%83%83%E3%83%88%202024-02-13%20085534.png" alt="要望案などもまってます">
        <p>できたてのサーバーなので大手サーバーのような権限による格差が少ないです！</p>
        <p>堅苦しいルールによる縛りがありません</p>
        <p>特定のゲームでの交流、寝落ち相手の募集などなど!</p>
        <p>まだまだ紹介しきれませんが、たくさんの事ができます!!</p>
        <p>過疎気味なので是非きてください！</p>
    </div>
<script src="script.js"></script>
