<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <style>
        body {
            background-color: #f1f1f1;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        .error-container {
            margin: 10% auto;
            max-width: 600px;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px; /* 角を丸くする */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #f44336;
            font-size: 3em;
        }

        p {
            font-size: 1.2em;
        }

        a {
            text-decoration: none;
            color: #2196F3;
        }

        a:hover {
            text-decoration: underline;
        }

        .error-image {
            width: 100px;
            height: 100px;
            background-image: url('your-image-url.jpg');
            background-size: cover;
            margin: 0 auto 20px;
            border-radius: 50%; /* 画像を丸くする */
        }
    </style>
</head>
<body>
    <div class="error-container">
        <img src="https://raw.githubusercontent.com/nezumi0627/nezumi0627.github.io/main/icon.jpg" alt="icon404" width="90" height="90" /> <!-- 画像を追加 -->
        <h1>404 Not Found</h1>
        <p>申し訳ありませんが、リクエストしたページは見つかりませんでした。</p>
        <p><a href="/">ホームページに戻る</a></p>
    </div>
    <script>
        // ホームページに戻るリンクのクリックイベントを設定
        document.querySelector('a').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = '/';
        });
    </script>
</body>
</html>
